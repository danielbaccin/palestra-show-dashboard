<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Suporte - Ingressos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f8;
padding:20px;
}

h1{
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:20px;
}

input{
padding:10px;
width:260px;
border-radius:6px;
border:1px solid #ccc;
margin-right:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2563eb;
color:white;
}

button:hover{
opacity:0.9;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

tr:hover{
background:#f9fafb;
}

.reenviar{
background:#16a34a;
}

.loading{
display:none;
margin-top:15px;
color:#555;
}

</style>
</head>

<div id="modal" style="display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;">

<div style="background:white;
padding:25px;
border-radius:10px;
width:300px">

<h3>Reenviar Ticket</h3>

<label>Nome</label>
<input id="modalNome" style="width:100%;margin-bottom:10px">

<label>Telefone</label>
<input id="modalTelefone" style="width:100%;margin-bottom:20px">

<div style="display:flex;gap:10px">

<button onclick="confirmarReenvio()">Enviar</button>

<button onclick="fecharModal()" style="background:#999">
Cancelar
</button>

</div>

</div>

</div>  

<body>

<h1>🎟️ Suporte de Ingressos</h1>

<div class="card">

<input id="busca" placeholder="Buscar por nome, telefone, ID ou número">

<button onclick="buscar()">Buscar</button>

<div class="loading" id="loading">
Carregando...
</div>

</div>

<div class="card">

<table id="tabela">

<thead>
<tr>
<th>ID</th>
<th>Número</th>
<th>Comprador</th>
<th>Tipo</th>
<th>Telefone</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

const URL_BUSCA="https://n8n.kenuiworks.cloud/webhook/ticket-busca"
const URL_REENVIO="https://n8n.kenuiworks.cloud/webhook/ticket-reenvio"

async function buscar(){

const termo=document.getElementById("busca").value

document.getElementById("loading").style.display="block"

const res=await fetch(`${URL_BUSCA}?q=${termo}&&token=999999`)
const dados=await res.json()

document.getElementById("loading").style.display="none"

const tbody=document.querySelector("#tabela tbody")

tbody.innerHTML=""

dados.forEach(ticket=>{

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${ticket.ID}</td>
<td>${ticket["Número sorteio"]}</td>
<td>${ticket["Nome Comprador"]}</td>
<td>${ticket["Tipo ingresso"]}</td>
<td>${ticket["Telefone Comprador"]}</td>
<td>${ticket.status}</td>

<td>

<button onclick="verTicket('${ticket.ID}')">
Ver Ticket
</button>

<button class="reenviar"
onclick="abrirModal(
'${ticket.ID}',
'${ticket["Nome Comprador"]}',
'${ticket["Telefone Comprador"]}'
)">
Reenviar
</button>

</td>

`

tbody.appendChild(tr)

})

}

async function reenviar(id,telefone){

const novo=prompt("Enviar para qual telefone?",telefone)

if(!novo) return

await fetch(URL_REENVIO,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
id:id,
telefone:novo
})
})

alert("Ticket reenviado!")

}

let ticketAtual = null

function abrirModal(id,nome,telefone){

ticketAtual = id

document.getElementById("modalNome").value = nome
document.getElementById("modalTelefone").value = telefone

document.getElementById("modal").style.display="flex"

}

function fecharModal(){

document.getElementById("modal").style.display="none"

}

async function confirmarReenvio(){

const nome = document.getElementById("modalNome").value
const telefone = document.getElementById("modalTelefone").value

await fetch(URL_REENVIO,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
id: ticketAtual,
nome: nome,
telefone: telefone
})
})

alert("Ticket reenviado!")

fecharModal()
  
}

async function verTicket(id){

const res = await fetch(`${URL_VER}?id=${id}`)
const data = await res.json()

const url = `https://SEU_DOMINIO_TICKETS/${data.image}`

window.open(url,"_blank")

}
</script>

</body>
</html>
